<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">

<style>
/* PAGE LAYOUT */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ffd6e7, #ffeef5);
    text-align: center;
}

/* TITLE */
h1 {
    margin-top: 20px;
    color: #d63384;
}

/* PINTEREST / MASONRY GRID */
.gallery {
    column-count: 3;
    column-gap: 15px;
    padding: 20px;
}

@media (max-width: 900px) {
    .gallery {
        column-count: 2;
    }
}

@media (max-width: 600px) {
    .gallery {
        column-count: 1;
    }
}

/* POLAROID STYLE CARD */
.card {
    break-inside: avoid;
    margin-bottom: 15px;
    background: white;
    padding: 10px 10px 20px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    transform: rotate(-1deg);
    transition: transform 0.3s ease;
}

.card:hover {
    transform: scale(1.03) rotate(0deg);
}

/* IMAGE */
.popup-img {
    width: 100%;
    border-radius: 10px;
    cursor: pointer;
}

/* CAPTION */
.caption {
    margin-top: 8px;
    font-size: 14px;
    color: #d63384;
}

/* POPUP */
#popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#popup img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
}

/* BUTTON */
button {
    margin: 20px;
    font-size: 20px;
    padding: 15px 25px;
    border-radius: 12px;
    border: none;
    background: #ff69b4;
    color: white;
    cursor: pointer;
}

/* FADE */
#fade {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
    z-index: 9998;
}

#fade.show {
    opacity: 0.7;
}

#loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: white;
    font-size: 28px;
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 9999;
}

#loading.show {
    opacity: 1;
}

/* SPARKLES */
.sparkle {
    position: fixed;
    pointer-events: none;
    font-size: 30px;
    animation: pop 1s ease-out forwards;
    z-index: 9999;
}

@keyframes pop {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--x), var(--y)) scale(0); opacity: 0; }
}
</style>

</head>

<body>

<h1>📸 Our Memories 📸</h1>

<!-- GALLERY -->
<div class="gallery">

    <div class="card">
        <img src="IMG-20251015-WA0007(2).jpg" class="popup-img">
        <div class="caption">One of my favourite moments 💖</div>
    </div>

    <div class="card">
        <img src="IMG-20260531-WA0005.jpg" class="popup-img">
        <div class="caption">Soft memories ✨</div>
    </div>

    <div class="card">
        <img src="IMG-20251129-WA0039(1).jpg" class="popup-img">
        <div class="caption">A day I’ll never forget 💫</div>
    </div>

</div>

<!-- POPUP -->
<div id="popup" onclick="closePopup()">
    <img id="popup-img">
</div>

<!-- BUTTON -->
<button onclick="goToCounter(event)">
⏳ Our Time Together ❤️
</button>

<!-- OVERLAY -->
<div id="fade"></div>
<div id="loading">Entering... 💖</div>

<script>
const popup = document.getElementById("popup");
const popupImg = document.getElementById("popup-img");

document.querySelectorAll(".popup-img").forEach(img => {
    img.addEventListener("click", function(){
        popup.style.display = "flex";
        popupImg.src = this.src;
    });
});

function closePopup(){
    popup.style.display = "none";
}

/* SPARKLES */
function createSparkles(x, y) {
    const emojis = ["✨","💖","⭐","💫"];

    for (let i = 0; i < 18; i++) {
        const s = document.createElement("div");
        s.classList.add("sparkle");
        s.innerText = emojis[Math.floor(Math.random() * emojis.length)];

        document.body.appendChild(s);

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 120;

        s.style.left = x + "px";
        s.style.top = y + "px";
        s.style.setProperty("--x", Math.cos(angle)*distance + "px");
        s.style.setProperty("--y", Math.sin(angle)*distance + "px");

        setTimeout(() => s.remove(), 1000);
    }
}

function goToCounter(event){
    event.preventDefault();

    const x = event.clientX;
    const y = event.clientY;

    createSparkles(x, y);

    document.getElementById("fade").classList.add("show");
    document.getElementById("loading").classList.add("show");

    setTimeout(() => {
        window.location.href = "counter.html";
    }, 2200);
}
</script>

</body>
</html>
