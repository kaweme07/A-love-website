<!DOCTYPE html>
<html>
<head>
    <title>Hey My Baby ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">
</head>

<body>

<h1>💌 Enter Secret Code</h1>

<input type="password" id="password">

<br><br>

<button onclick="handleEnter(event)">
Enter
</button>

<p id="days"></p>

<div class="button-container"></div>

<!-- HEART SCRIPT -->
<script>
function createHeart(){
    const heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart");

    heart.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}

setInterval(createHeart, 1000);
</script>

<!-- PASSWORD + SPARKLE SYSTEM -->
<script>
function createSparkles(x, y) {
    const emojis = ["✨", "💫", "✨", "💫"];

    for (let i = 0; i < 12; i++) {
        const sparkle = document.createElement("div");
        sparkle.classList.add("sparkle");
        sparkle.innerText = emojis[Math.floor(Math.random() * emojis.length)];

        document.body.appendChild(sparkle);

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 90;

        const dx = Math.cos(angle) * distance + "px";
        const dy = Math.sin(angle) * distance + "px";

        sparkle.style.left = x + "px";
        sparkle.style.top = y + "px";
        sparkle.style.setProperty("--x", dx);
        sparkle.style.setProperty("--y", dy);

        setTimeout(() => {
            sparkle.remove();
        }, 800);
    }
}

function checkPassword(){
    let password = document.getElementById("password").value;

    if(password === "love"){
        return true;
    }
    else{
        alert("Wrong password 😭");
        return false;
    }
}

function handleEnter(event){
    const x = event.clientX;
    const y = event.clientY;

    // always sparkles first
    createSparkles(x, y);

    // delay redirect so sparkles show properly
    setTimeout(() => {
        if(checkPassword()){
            window.location.href = "letter.html";
        }
    }, 300);
}
</script>

</body>
</html>
