<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Love Counter 💕</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffeef5);
      color: #d63384;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
    }

    .counter-box {
      margin-top: 20px;
      padding: 25px 35px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.6);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      font-size: 28px;
      font-weight: bold;
    }

    .small {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.7;
    }

    .heart {
      animation: pulse 1s infinite;
      display: inline-block;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .site-button {
      margin-top: 20px;
      font-size: 30px;
      padding: 20px 40px;
      border-radius: 15px;
      background-color: #ff69b4;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .site-button:hover {
      transform: scale(1.1);
    }

    /* FADE SCREEN */
    #fade {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
      z-index: 9998;
    }

    #fade.show {
      opacity: 0.7;
    }

    /* LOADING TEXT */
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 32px;
      color: white;
      font-family: Arial, sans-serif;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 9999;
    }

    #loading.show {
      opacity: 1;
    }

    /* SPARKLES */
    .sparkle {
      position: fixed;
      pointer-events: none;
      font-size: 18px;
      animation: pop 1s ease-out forwards;
      z-index: 9999;
    }

    @keyframes pop {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(0);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <h1>Our Time Together <span class="heart">❤️</span></h1>
  <p>Since 07 January 2024</p>

  <div class="counter-box" id="counter">
    Loading...
  </div>

  <div class="small">
   Every second counts! Literally 😂 
  </div>

  <!-- OVERLAYS -->
  <div id="fade"></div>
  <div id="loading">Loading... 💖</div>

  <button class="site-button" onclick="goToMusic(event)">
    Our Song 🎶
  </button>

  <script>
    const startDate = new Date("2024-01-07T00:00:00");

    function updateCounter() {
      const now = new Date();
      const diff = now - startDate;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("counter").innerHTML =
        `${days} days • ${hours} hours • ${minutes} minutes • ${seconds} seconds`;
    }

    updateCounter();
    setInterval(updateCounter, 1000);

    function createSparkles(x, y) {
      const emojis = ["✨", "💫", "✨", "💫"];

      for (let i = 0; i < 18; i++) {
        const sparkle = document.createElement("div");
        sparkle.classList.add("sparkle");
        sparkle.innerText = emojis[Math.floor(Math.random() * emojis.length)];

        document.body.appendChild(sparkle);

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 120;

        sparkle.style.left = x + "px";
        sparkle.style.top = y + "px";

        sparkle.style.setProperty("--x", Math.cos(angle) * distance + "px");
        sparkle.style.setProperty("--y", Math.sin(angle) * distance + "px");

        setTimeout(() => sparkle.remove(), 1000);
      }
    }

    function goToMusic(event){
      event.preventDefault();

      const x = event.clientX;
      const y = event.clientY;

      createSparkles(x, y);

      const fade = document.getElementById("fade");
      const loading = document.getElementById("loading");

      fade.classList.add("show");
      loading.classList.add("show");

      setTimeout(() => {
        window.location.href = "music.html";
      }, 2200);
    }
  </script>

</body>
</html>
