<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">

<style>
/* FADE SCREEN */
#fade {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
    z-index: 9998;
}

#fade.show {
    opacity: 0.7;
}

/* LOADING TEXT */
#loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px;
    color: white;
    font-family: Arial, sans-serif;
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 9999;
}

#loading.show {
    opacity: 1;
}

/* SPARKLES */
.sparkle {
    position: fixed;
    pointer-events: none;
    font-size: 18px;
    animation: pop 1s ease-out forwards;
    z-index: 9999;
}

@keyframes pop {
    0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translate(var(--x), var(--y)) scale(0);
        opacity: 0;
    }
}
</style>

</head>

<body class="music-page">

<h1>🎶 Our Song 🎶</h1>

<audio controls autoplay>
    <source src="Polo G - Martin & Gina (Lyrics) [u0znp7mj5io] (1).mp3" type="audio/mpeg">
</audio>

<br><br>

<button onclick="goHome(event)">
Back to Home
</button>

<!-- OVERLAYS -->
<div id="fade"></div>
<div id="loading">... 💖</div>

<script>

function createSparkles(x, y) {
    const emojis = ["✨", "💫", "✨", "💫"];

    for (let i = 0; i < 18; i++) {
        const sparkle = document.createElement("div");
        sparkle.classList.add("sparkle");
        sparkle.innerText = emojis[Math.floor(Math.random() * emojis.length)];

        document.body.appendChild(sparkle);

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 120;

        sparkle.style.left = x + "px";
        sparkle.style.top = y + "px";

        sparkle.style.setProperty("--x", Math.cos(angle) * distance + "px");
        sparkle.style.setProperty("--y", Math.sin(angle) * distance + "px");

        setTimeout(() => sparkle.remove(), 1000);
    }
}

function goHome(event){
    event.preventDefault();

    const x = event.clientX;
    const y = event.clientY;

    createSparkles(x, y);

    const fade = document.getElementById("fade");
    const loading = document.getElementById("loading");

    fade.classList.add("show");
    loading.classList.add("show");

    setTimeout(() => {
        window.location.href = "index.html";
    }, 2200);
}

</script>

</body>
</html>
