<!DOCTYPE html>
<html>
<head>
    <title>Hey My Baby ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script&display=swap" rel="stylesheet">

    <style>
        /* SCREEN FADE OVERLAY */
        #fade {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
            z-index: 9998;
        }

        #fade.show {
            opacity: 0.7;
        }

        /* LOADING TEXT */
        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px;
            font-family: 'Dancing Script', cursive;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 9999;
        }

        #loading.show {
            opacity: 1;
        }

        /* SPARKLES */
        .sparkle {
            position: fixed;
            pointer-events: none;
            font-size: 40px;
            animation: pop 1s ease-out forwards;
            z-index: 9999;
        }

        @keyframes pop {
            0% {
                transform: translate(0, 0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(var(--x), var(--y)) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

<h1>💌 Enter Secret Code</h1>

<input type="password" id="password">

<br><br>

<button onclick="handleEnter(event)">
Enter
</button>

<p id="days"></p>

<div class="button-container"></div>

<!-- OVERLAY ELEMENTS -->
<div id="fade"></div>
<div id="loading">ENTERING... 💖</div>

<!-- HEARTS -->
<script>
function createHeart(){
    const heart = document.createElement("div");
    heart.innerHTML = "❤️";
    heart.classList.add("heart");

    heart.style.left = Math.random() * 100 + "vw";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
}

setInterval(createHeart, 1000);
</script>

<!-- MAIN LOGIC -->
<script>
function createSparkles(x, y) {
    const emojis = ["✨", "💫", "✨", "💫"];

    for (let i = 0; i < 18; i++) {
        const sparkle = document.createElement("div");
        sparkle.classList.add("sparkle");
        sparkle.innerText = emojis[Math.floor(Math.random() * emojis.length)];

        document.body.appendChild(sparkle);

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 120;

        sparkle.style.left = x + "px";
        sparkle.style.top = y + "px";

        sparkle.style.setProperty("--x", Math.cos(angle) * distance + "px");
        sparkle.style.setProperty("--y", Math.sin(angle) * distance + "px");

        setTimeout(() => sparkle.remove(), 1000);
    }
}

function checkPassword(){
    const password = document.getElementById("password").value;

    if(password === "love"){
        return true;
    } else {
        alert("Wrong password 😭");
        return false;
    }
}

function handleEnter(event){
    const x = event.clientX;
    const y = event.clientY;

    // sparkle burst
    createSparkles(x, y);

    // start cinematic transition
    const fade = document.getElementById("fade");
    const loading = document.getElementById("loading");

    fade.classList.add("show");
    loading.classList.add("show");

    // delay redirect so everything plays properly
    setTimeout(() => {
        if(checkPassword()){
            window.location.href = "letter.html";
        } else {
            fade.classList.remove("show");
            loading.classList.remove("show");
        }
    }, 2200);
}
</script>

</body>
</html>
