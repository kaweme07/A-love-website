<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">

<style>
/* FADE OVERLAY */
#fade {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: black;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease;
    z-index: 9998;
}

#fade.show {
    opacity: 0.7;
}

/* LOADING TEXT */
#loading {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px;
    color: white;
    font-family: 'Dancing Script', cursive;
    opacity: 0;
    transition: opacity 0.5s ease;
    z-index: 9999;
}

#loading.show {
    opacity: 1;
}

/* SPARKLES */
.sparkle {
    position: fixed;
    pointer-events: none;
    font-size: 40px;
    animation: pop 1s ease-out forwards;
    z-index: 9999;
}

@keyframes pop {
    0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
    }
    100% {
        transform: translate(var(--x), var(--y)) scale(0);
        opacity: 0;
    }
}

/* POPUP FIX (important so it still sits on top) */
#popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9997;
}

#popup img {
    max-width: 90%;
    max-height: 90%;
}
</style>

</head>

<body>

<h1>📸 Our Memories 📸</h1>

<img src="IMG-20251015-WA0007(2).jpg" class="popup-img">
<img src="IMG-20260531-WA0005.jpg" class="popup-img">
<img src="IMG-20251129-WA0039(1).jpg" class="popup-img">

<!-- POPUP BOX -->
<div id="popup" onclick="closePopup()">
    <img id="popup-img">
</div>

<br><br>

<a href="counter.html">
    <button onclick="goToCounter(event)">⏳ Our Time Together ❤️</button>
</a>

<!-- OVERLAY -->
<div id="fade"></div>
<div id="loading">... 💖</div>

<script>

/* POPUP IMAGE CODE (unchanged, still works) */
const popup = document.getElementById("popup");
const popupImg = document.getElementById("popup-img");

document.querySelectorAll(".popup-img").forEach(img => {
    img.addEventListener("click", function(){
        popup.style.display = "flex";
        popupImg.src = this.src;
    });
});

function closePopup(){
    popup.style.display = "none";
}

/* SPARKLES */
function createSparkles(x, y) {
    const emojis = ["✨", "💫", "✨", "💫"];

    for (let i = 0; i < 18; i++) {
        const sparkle = document.createElement("div");
        sparkle.classList.add("sparkle");
        sparkle.innerText = emojis[Math.floor(Math.random() * emojis.length)];

        document.body.appendChild(sparkle);

        const angle = Math.random() * 2 * Math.PI;
        const distance = Math.random() * 120;

        sparkle.style.left = x + "px";
        sparkle.style.top = y + "px";

        sparkle.style.setProperty("--x", Math.cos(angle) * distance + "px");
        sparkle.style.setProperty("--y", Math.sin(angle) * distance + "px");

        setTimeout(() => sparkle.remove(), 1000);
    }
}

/* BUTTON TRANSITION */
function goToCounter(event){
    event.preventDefault(); // stops instant navigation

    const x = event.clientX;
    const y = event.clientY;

    createSparkles(x, y);

    const fade = document.getElementById("fade");
    const loading = document.getElementById("loading");

    fade.classList.add("show");
    loading.classList.add("show");

    setTimeout(() => {
        window.location.href = "counter.html";
    }, 2200);
}

</script>

</body>
</html>
