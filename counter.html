<script>

const startDate =
new Date("2025-09-26");

function updateCounter(){

    const now =
    new Date();

    const diff =
    now - startDate;

    const days =
    Math.floor(diff/(1000*60*60*24));

    const hours =
    Math.floor(
    (diff%(1000*60*60*24))
    /(1000*60*60)
    );

    document
    .getElementById("days")
    .innerHTML =
    days +
    " days ❤️ " +
    hours +
    " hours";
}

setInterval(updateCounter,1000);

</script>
