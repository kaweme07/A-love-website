<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Our Love Counter 💕</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ffd6e7, #ffeef5);
      color: #d63384;
      text-align: center;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      opacity: 0.8;
    }

    .counter-box {
      margin-top: 20px;
      padding: 25px 35px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.6);
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      font-size: 28px;
      font-weight: bold;
    }

    .small {
      margin-top: 15px;
      font-size: 14px;
      opacity: 0.7;
    }

    .heart {
      animation: pulse 1s infinite;
      display: inline-block;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>

<body>

  <h1>Our Time Together <span class="heart">❤️</span></h1>
  <p>Since 26 September 2025</p>

  <div class="counter-box" id="counter">
    Loading...
  </div>

  <div class="small">
    Every second counts! Literally 😂 
  </div>

  <script>
    const startDate = new Date("2025-09-26T00:00:00");

    function updateCounter() {
      const now = new Date();
      const diff = now - startDate;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      document.getElementById("counter").innerHTML =
        `${days} days • ${hours} hours • ${minutes} minutes • ${seconds} seconds`;
    }

    updateCounter();
    setInterval(updateCounter, 1000);
  </script>

  <a href="music.html">
<button>Our Song 🎶</button>
  </a>
  
</body>
</html>
